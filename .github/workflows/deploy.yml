name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            # Clone or pull
            if [ ! -d /opt/social-queue ]; then
              git clone https://github.com/fberrez/social-queue.git /opt/social-queue
            else
              cd /opt/social-queue
              git fetch origin
              git reset --hard origin/main
            fi

            cd /opt/social-queue

            # Write .env from secrets
            cat > .env << 'ENVEOF'
            BLUESKY_SERVICE=${{ secrets.BLUESKY_SERVICE }}
            BLUESKY_IDENTIFIER=${{ secrets.BLUESKY_IDENTIFIER }}
            BLUESKY_PASSWORD=${{ secrets.BLUESKY_PASSWORD }}
            MASTODON_URL=${{ secrets.MASTODON_URL }}
            MASTODON_ACCESS_TOKEN=${{ secrets.MASTODON_ACCESS_TOKEN }}
            LINKEDIN_ACCESS_TOKEN=${{ secrets.LINKEDIN_ACCESS_TOKEN }}
            LINKEDIN_PERSON_ID=${{ secrets.LINKEDIN_PERSON_ID }}
            POLL_INTERVAL_MS=60000
            ENVEOF
            sed -i 's/^[[:space:]]*//' .env

            # Create queue dirs on host (mounted as volumes)
            mkdir -p /opt/social-queue/queue /opt/social-queue/sent /opt/social-queue/failed

            # Build and run
            docker build -t social-queue .
            docker stop social-queue 2>/dev/null || true
            docker rm social-queue 2>/dev/null || true
            docker run -d \
              --name social-queue \
              --restart unless-stopped \
              --env-file .env \
              -v /opt/social-queue/queue:/app/queue \
              -v /opt/social-queue/sent:/app/sent \
              -v /opt/social-queue/failed:/app/failed \
              social-queue

            echo "Deployed successfully:"
            docker ps --filter name=social-queue --format "table {{.Status}}\t{{.Image}}"
